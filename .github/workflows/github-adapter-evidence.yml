name: GitHub Adapter Evidence

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  github-adapter-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev requirements
        run: python -m pip install -r requirements-dev.txt

      - name: Generate GitHub adapter evidence
        run: python scripts/github_adapter_sample_evidence.py

      - name: Upload GitHub adapter evidence
        uses: actions/upload-artifact@v4
        with:
          name: github-adapter-evidence
          path: reports/
