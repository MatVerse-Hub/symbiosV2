name: Native Layer CI Evidence

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  native-layer-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev requirements
        run: python -m pip install -r requirements-dev.txt

      - name: Generate CI evidence report
        run: python scripts/generate_ci_evidence.py --output reports/native_layer_ci_report.json

      - name: Upload CI evidence report
        uses: actions/upload-artifact@v4
        with:
          name: native-layer-ci-evidence
          path: reports/native_layer_ci_report.json

      - name: Write workflow summary
        if: always()
        run: |
          echo "## MatVerse Native Network Layer CI" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/native_layer_ci_report.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat reports/native_layer_ci_report.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Evidence report missing: BLOCK" >> "$GITHUB_STEP_SUMMARY"
          fi
